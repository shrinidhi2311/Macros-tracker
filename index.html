<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Macro & Fiber Tracker</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #2ecc71;
            --fiber-color: #9b59b6;
            --border-radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1, h2, h3 { margin-top: 0; color: #2c3e50; }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
        
        /* Form styling */
        label { display: block; margin: 8px 0 4px; font-weight: bold; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 10px; box-sizing: border-box;
            border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 1rem;
        }
        button {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        button.secondary { background: #7f8c8d; margin-top: 5px; }
        
        /* Specific elements */
        .calorie-big { font-size: 2.5rem; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; }
        .macro-box { background: #f8f9fa; padding: 8px; border-radius: 6px; font-size: 0.85rem; }
        .macro-box span { display: block; font-size: 1.1rem; font-weight: bold; }
        .fiber-highlight { border-left: 4px solid var(--fiber-color); }
        
        .food-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #eee;
        }
        .delete-btn { background: #e74c3c; width: auto; padding: 4px 8px; font-size: 0.8rem; }
        .prediction-box { background: #e8f8f5; border-left: 4px solid #1abc9c; padding: 15px; border-radius: 6px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card">
        <h2>Daily Overview (<span id="current-date"></span>)</h2>
        <div class="calorie-big" id="cal-remaining">0</div>
        <div style="text-align:center; margin-bottom: 15px; font-size: 0.9rem; color: #7f8c8d;">Calories Remaining</div>
        
        <div class="grid-4">
            <div class="macro-box">Carbs<span id="carb-status">0 / 0g</span></div>
            <div class="macro-box">Protein<span id="protein-status">0 / 0g</span></div>
            <div class="macro-box">Fat<span id="fat-status">0 / 0g</span></div>
            <div class="macro-box fiber-highlight">Fiber<span id="fiber-status">0 / 0g</span></div>
        </div>
    </div>

    <div class="card grid-2">
        <div>
            <h3>💧 Water</h3>
            <div style="font-size: 1.2rem; margin-bottom:8px;"><span id="water-display">0</span> ml</div>
            <button onclick="addWater(250)">+250ml</button>
        </div>
        <div>
            <h3>⚖️ Weight</h3>
            <input type="number" id="weight-input" step="0.1" placeholder="kg" onchange="saveWeight(this.value)">
        </div>
    </div>

    <div class="card">
        <h3>🍽️ Log Food</h3>
        <label>Select Saved Food</label>
        <select id="food-selector"></select>
        <label>Servings</label>
        <input type="number" id="food-servings" value="1" step="0.1">
        <button onclick="logFood()">Eat Food</button>
        
        <h4 style="margin-top:20px; margin-bottom:10px;">Today's Log:</h4>
        <div id="today-food-list"></div>
    </div>

    <div class="card">
        <h3>🔮 5-Week Projection</h3>
        <div class="prediction-box" id="prediction-text">
            Log your weight and some food to see your 5-week projection.
        </div>
    </div>

    <div class="card">
        <h3>➕ Create Custom Food</h3>
        <input type="text" id="nf-name" placeholder="Food Name">
        <div class="grid-2">
            <input type="number" id="nf-cal" placeholder="Calories">
            <input type="number" id="nf-carb" placeholder="Carbs (g)">
            <input type="number" id="nf-protein" placeholder="Protein (g)">
            <input type="number" id="nf-fat" placeholder="Fat (g)">
        </div>
        <input type="number" id="nf-fiber" placeholder="Fiber (g)">
        <button onclick="createCustomFood()">Save to My Database</button>
    </div>

    <div class="card">
        <h3>⚙️ Setup My Profile & Goals</h3>
        <div class="grid-2">
            <input type="number" id="prof-age" placeholder="Age">
            <select id="prof-gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>
            <input type="number" id="prof-height" placeholder="Height (cm)">
            <input type="number" id="prof-weight" placeholder="Current Weight (kg)">
        </div>
        <label>Goal</label>
        <select id="prof-goal">
            <option value="-500">Lose Weight (-500 cal)</option>
            <option value="0">Maintain Weight</option>
            <option value="500">Gain Muscle (+500 cal)</option>
        </select>
        <button onclick="calculateBMRGoals()">Auto-Calculate Targets</button>
        
        <h4 style="margin-top:15px; margin-bottom:5px;">Fine-Tune Gram Targets:</h4>
        <div class="grid-2">
            <div><label>Calorie Goal</label><input type="number" id="goal-cal"></div>
            <div><label>Carb Goal (g)</label><input type="number" id="goal-carb"></div>
            <div><label>Protein Goal (g)</label><input type="number" id="goal-protein"></div>
            <div><label>Fat Goal (g)</label><input type="number" id="goal-fat"></div>
        </div>
        <label style="color:var(--fiber-color)">Custom Fiber Goal (g)</label>
        <input type="number" id="goal-fiber">
        <button class="secondary" onclick="saveManualGoals()">Save Goals Directly</button>
    </div>

</div>

<script>
    // App State Management
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('current-date').innerText = todayStr;

    let appData = JSON.parse(localStorage.getItem('myFitnessCloneData')) || {
        customFoods: [{ name: "Example Egg", calories: 70, carbs: 0, protein: 6, fat: 5, fiber: 0 }],
        dailyLogs: {},
        goals: { calories: 2000, carbs: 200, protein: 140, fat: 65, fiber: 30 },
        profile: { age: 25, gender: 'female', height: 165, weight: 70, goal: -500 }
    };

    // Ensure today's layout exists
    if (!appData.dailyLogs[todayStr]) {
        appData.dailyLogs[todayStr] = { foods: [], water: 0, weight: appData.profile.weight || 70 };
    }

    function saveToStorage() {
        localStorage.setItem('myFitnessCloneData', JSON.stringify(appData));
        updateUI();
    }

    // Goal Calculations
    function calculateBMRGoals() {
        const age = parseFloat(document.getElementById('prof-age').value) || 25;
        const gender = document.getElementById('prof-gender').value;
        const height = parseFloat(document.getElementById('prof-height').value) || 165;
        const weight = parseFloat(document.getElementById('prof-weight').value) || 70;
        const goalModifier = parseFloat(document.getElementById('prof-goal').value);

        // Mifflin-St Jeor Equation
        let bmr = (10 * weight) + (6.25 * height) - (5 * age);
        bmr = (gender === 'male') ? bmr + 5 : bmr - 161;
        
        let tdee = bmr * 1.2; // Assuming sedentary base line factor
        let targetCalories = Math.round(tdee + goalModifier);

        // Macro Splits (Rough safe baseline splits: 40% Carb, 30% Protein, 30% Fat)
        appData.goals.calories = targetCalories;
        appData.goals.carbs = Math.round((targetCalories * 0.40) / 4);
        appData.goals.protein = Math.round((targetCalories * 0.30) / 4);
        appData.goals.fat = Math.round((targetCalories * 0.30) / 9);
        appData.goals.fiber = (gender === 'male') ? 38 : 25; // Standard health recommendations

        appData.profile = { age, gender, height, weight, goal: goalModifier };
        appData.dailyLogs[todayStr].weight = weight;
        
        saveToStorage();
    }

    function saveManualGoals() {
        appData.goals.calories = parseInt(document.getElementById('goal-cal').value);
        appData.goals.carbs = parseInt(document.getElementById('goal-carb').value);
        appData.goals.protein = parseInt(document.getElementById('goal-protein').value);
        appData.goals.fat = parseInt(document.getElementById('goal-fat').value);
        appData.goals.fiber = parseInt(document.getElementById('goal-fiber').value);
        saveToStorage();
    }

    // Food Features
    function createCustomFood() {
        const name = document.getElementById('nf-name').value || "Unnamed Food";
        const calories = parseInt(document.getElementById('nf-cal').value) || 0;
        const carbs = parseInt(document.getElementById('nf-carb').value) || 0;
        const protein = parseInt(document.getElementById('nf-protein').value) || 0;
        const fat = parseInt(document.getElementById('nf-fat').value) || 0;
        const fiber = parseInt(document.getElementById('nf-fiber').value) || 0;

        appData.customFoods.push({ name, calories, carbs, protein, fat, fiber });
        
        // Clear fields
        document.getElementById('nf-name').value = '';
        document.getElementById('nf-cal').value = '';
        document.getElementById('nf-carb').value = '';
        document.getElementById('nf-protein').value = '';
        document.getElementById('nf-fat').value = '';
        document.getElementById('nf-fiber').value = '';
        
        saveToStorage();
    }

    function logFood() {
        const selector = document.getElementById('food-selector');
        const index = selector.value;
        const servings = parseFloat(document.getElementById('food-servings').value) || 1;

        if(index === "") return;
        const baseFood = appData.customFoods[index];

        appData.dailyLogs[todayStr].foods.push({
            name: baseFood.name,
            calories: Math.round(baseFood.calories * servings),
            carbs: Math.round(baseFood.carbs * servings),
            protein: Math.round(baseFood.protein * servings),
            fat: Math.round(baseFood.fat * servings),
            fiber: Math.round(baseFood.fiber * servings),
            servings: servings
        });

        saveToStorage();
    }

    function deleteLoggedFood(index) {
        appData.dailyLogs[todayStr].foods.splice(index, 1);
        saveToStorage();
    }

    function addWater(amount) {
        appData.dailyLogs[todayStr].water += amount;
        saveToStorage();
    }

    function saveWeight(val) {
        appData.dailyLogs[todayStr].weight = parseFloat(val);
        appData.profile.weight = parseFloat(val);
        saveToStorage();
    }

    // UI Engine update
    function updateUI() {
        const currentLog = appData.dailyLogs[todayStr];
        
        // Totals mapping
        let totals = { calories: 0, carbs: 0, protein: 0, fat: 0, fiber: 0 };
        currentLog.foods.forEach(f => {
            totals.calories += f.calories;
            totals.carbs += f.carbs;
            totals.protein += f.protein;
            totals.fat += f.fat;
            totals.fiber += f.fiber;
        });

        // Remainder calculations
        document.getElementById('cal-remaining').innerText = appData.goals.calories - totals.calories;
        document.getElementById('carb-status').innerText = `${totals.carbs} / ${appData.goals.carbs}g`;
        document.getElementById('protein-status').innerText = `${totals.protein} / ${appData.goals.protein}g`;
        document.getElementById('fat-status').innerText = `${totals.fat} / ${appData.goals.fat}g`;
        document.getElementById('fiber-status').innerText = `${totals.fiber} / ${appData.goals.fiber}g`;
        
        document.getElementById('water-display').innerText = currentLog.water;
        document.getElementById('weight-input').value = currentLog.weight;

        // Render food database selector
        const selector = document.getElementById('food-selector');
        selector.innerHTML = '<option value="">-- Choose Food --</option>';
        appData.customFoods.forEach((food, index) => {
            selector.innerHTML += `<option value="${index}">${food.name} (${food.calories} cal)</option>`;
        });

        // Render today's eaten list
        const listDiv = document.getElementById('today-food-list');
        listDiv.innerHTML = '';
        currentLog.foods.forEach((f, idx) => {
            listDiv.innerHTML += `
                <div class="food-item">
                    <div>
                        <strong>${f.name}</strong> (${f.servings} serv)<br>
                        <small>C: ${f.carbs}g | P: ${f.protein}g | F: ${f.fat}g | Fiber: ${f.fiber}g</small>
                    </div>
                    <div style="text-align:right;">
                        <div>${f.calories} cal</div>
                        <button class="delete-btn" onclick="deleteLoggedFood(${idx})">X</button>
                    </div>
                </div>`;
        });

        // Render inputs for settings values
        document.getElementById('goal-cal').value = appData.goals.calories;
        document.getElementById('goal-carb').value = appData.goals.carbs;
        document.getElementById('goal-protein').value = appData.goals.protein;
        document.getElementById('goal-fat').value = appData.goals.fat;
        document.getElementById('goal-fiber').value = appData.goals.fiber;
        
        document.getElementById('prof-age').value = appData.profile.age;
        document.getElementById('prof-height').value = appData.profile.height;
        document.getElementById('prof-weight').value = appData.profile.weight;
        document.getElementById('prof-gender').value = appData.profile.gender;
        document.getElementById('prof-goal').value = appData.profile.goal;

        // Calculate 5 week estimation
        const currentWeight = currentLog.weight || appData.profile.weight;
        // Simple prediction: Deficit or surplus vs our target baseline setting multiplied out
        const targetCalIntake = appData.goals.calories;
        const currentCalIntake = totals.calories;
        
        // Use standard daily macro calculation projection
        let dailyDeficitOrSurplus = targetCalIntake - currentCalIntake;
        // factor in what the user settings wanted as a modifier
        let estimatedDeficit = appData.profile.goal; 
        
        if (currentCalIntake > 0) {
            let projectedWeightLossLbs = (estimatedDeficit * 35) / 3500; 
            let finalProjectedWeight = (currentWeight + (projectedWeightLossLbs * 0.453592)).toFixed(1); // outputting in kg
            document.getElementById('prediction-text').innerText = `If you eat every day like today, in 5 weeks you are projected to weigh approximately ${finalProjectedWeight} kg.`;
        } else {
            document.getElementById('prediction-text').innerText = "Log your foods today to calculate a 5-week tracking prediction.";
        }
    }

    // Init run
    updateUI();
</script>
</body>
</html>
